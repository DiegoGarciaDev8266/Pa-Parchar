<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pa Parchar · Carta</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-texto">Cargando carta...</div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-logo">
      <div class="logo-img-wrap">
        <img src="assets/logo.png" alt="Pa Parchar" class="logo-img"
             onerror="this.parentElement.style.display='none';document.querySelector('.logo-icon').classList.add('visible')"/>
      </div>
      <div class="logo-icon">🍔</div>
      
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Principal</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-texto">Dashboard</span></a>
        <a href="carta.html" class="nav-item active"><span class="nav-icon">🍽️</span><span class="nav-texto">Carta / Menú</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Operaciones</div>
        <a href="ventas.html" class="nav-item"><span class="nav-icon">🛒</span><span class="nav-texto">Registrar Ventas</span></a>
        <a href="inventario.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-texto">Inventario</span><span class="nav-badge" id="badge-inv" style="display:none">0</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Análisis</div>
        <a href="finanzas.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-texto">Finanzas</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-nombre">Administrador</div>
          <div class="user-rol">Pa Parchar · 2026</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
        <div>
          <div class="page-title">Carta / Menú</div>
          <div class="page-subtitle">Productos disponibles y precios</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-fecha" id="fecha-hoy"></div>
        <button class="btn btn-primary btn-sm" onclick="abrirModalNuevo()">+ Nuevo producto</button>
      </div>
    </header>

    <main class="page fade-in">
      <div class="kpi-grid" id="kpis-carta"></div>
      <div class="card">
        <div class="card-header">
          <div class="card-titulo">Filtrar por categoría</div>
          <input type="text" class="form-input" id="buscador" placeholder="🔍 Buscar producto..." style="max-width:220px" oninput="filtrar()"/>
        </div>
        <div class="filtros-wrap" id="filtros"></div>
      </div>
      <div id="productos-container"></div>
    </main>

    <footer class="app-footer">
      <span>Pa Parchar © 2026 · Manizales, Caldas</span>
      <span id="footer-stats">Cargando...</span>
    </footer>
  </div>
</div>

<div class="modal-overlay" id="modal-producto">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo" id="modal-titulo">Nuevo producto</div>
      <button class="btn btn-ghost btn-icon" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="al-modal" class="alert"></div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label class="form-label">Nombre *</label>
          <input class="form-input" id="m-nombre" placeholder="Ej: Hamburguesa Clásica"/>
        </div>
        <div class="form-group" style="flex:0 0 80px">
          <label class="form-label">Emoji</label>
          <input class="form-input" id="m-emoji" placeholder="🍔" style="text-align:center;font-size:20px"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Precio (COP) *</label>
          <input class="form-input" id="m-precio" type="number" placeholder="14000" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Categoría *</label>
          <select class="form-select" id="m-categoria">
            <option value="Fastfood">Fastfood</option>
            <option value="Acompañamiento">Acompañamiento</option>
            <option value="Bebidas">Bebidas</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Descripción</label>
        <input class="form-input" id="m-descripcion" placeholder="Ingredientes o descripción del producto"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProducto()">💾 Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { db, collection, getDocs, addDoc, setDoc, updateDoc, deleteDoc, doc } from "./js/firebase.js";
import { PRODUCTOS_BASE, INVENTARIO_BASE } from "./js/datos.js";
import { fmt, setFechaTopbar, seedData, actualizarBadgeInv, showAlert } from "./js/utils.js";

let PRODUCTOS = [], categoriaActiva = "Todas", editandoId = null;

async function init() {
  setFechaTopbar();
  await seedData(db, { collection, getDocs, setDoc, addDoc, doc }, { PRODUCTOS_BASE, INVENTARIO_BASE });
  await cargarProductos();
  actualizarBadgeInv(db, collection, getDocs);
  document.getElementById("loading").style.display = "none";
}

async function cargarProductos() {
  const snap = await getDocs(collection(db, "Productos"));
  PRODUCTOS = [];
  snap.forEach(d => PRODUCTOS.push({ _id: d.id, ...d.data() }));
  PRODUCTOS.sort((a,b) => a.nombre.localeCompare(b.nombre));
  renderKPIs(); renderFiltros(); renderProductos();
  document.getElementById("footer-stats").textContent = `${PRODUCTOS.length} productos activos`;
}

function renderKPIs() {
  const activos = PRODUCTOS.filter(p => p.activo !== false).length;
  const cats    = [...new Set(PRODUCTOS.map(p => p.categoria))].length;
  const maxP    = Math.max(...PRODUCTOS.map(p=>p.precio));
  const minP    = Math.min(...PRODUCTOS.map(p=>p.precio));
  document.getElementById("kpis-carta").innerHTML = `
    <div class="kpi-card"><div class="kpi-icon">🍽️</div><div class="kpi-label">Productos activos</div><div class="kpi-valor">${activos}</div></div>
    <div class="kpi-card"><div class="kpi-icon">🗂️</div><div class="kpi-label">Categorías</div><div class="kpi-valor">${cats}</div></div>
    <div class="kpi-card verde"><div class="kpi-icon">💎</div><div class="kpi-label">Precio más alto</div><div class="kpi-valor">${fmt(maxP)}</div></div>
    <div class="kpi-card"><div class="kpi-icon">💡</div><div class="kpi-label">Precio más bajo</div><div class="kpi-valor">${fmt(minP)}</div></div>`;
}

function renderFiltros() {
  const cats = ["Todas", ...new Set(PRODUCTOS.map(p => p.categoria))];
  document.getElementById("filtros").innerHTML = cats.map(c =>
    `<span class="categoria-tag ${c===categoriaActiva?'active':''}" onclick="setCat('${c}')">${c}</span>`).join("");
}

function renderProductos() {
  const busq = (document.getElementById("buscador")?.value || "").toLowerCase();
  const lista = PRODUCTOS.filter(p => {
    const matchCat  = categoriaActiva === "Todas" || p.categoria === categoriaActiva;
    const matchBusq = !busq || p.nombre.toLowerCase().includes(busq);
    return matchCat && matchBusq && p.activo !== false;
  });
  const cats = categoriaActiva === "Todas" ? [...new Set(lista.map(p => p.categoria))] : [categoriaActiva];
  const cont = document.getElementById("productos-container");
  if (!lista.length) { cont.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No se encontraron productos</div></div>`; return; }
  cont.innerHTML = cats.map(cat => {
    const prods = lista.filter(p => p.categoria === cat);
    if (!prods.length) return "";
    return `<div class="card"><div class="card-header"><div class="card-titulo">${cat}</div><span class="badge badge-gris">${prods.length} productos</span></div>
      <div class="producto-grid">${prods.map(p => `
        <div class="producto-card">
          <div class="producto-emoji">${p.emoji || "🍽️"}</div>
          <div class="producto-nombre">${p.nombre}</div>
          <div class="producto-precio">${fmt(p.precio)}</div>
          <div class="producto-cat">${p.descripcion || ""}</div>
          <div style="display:flex;gap:6px;margin-top:10px;justify-content:center">
            <button class="btn btn-secondary btn-sm" onclick="editarProducto('${p._id}')">✏️ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="eliminarProducto('${p._id}','${p.nombre}')">🗑️</button>
          </div>
        </div>`).join("")}</div></div>`;
  }).join("");
}

window.setCat = (cat) => { categoriaActiva = cat; renderFiltros(); renderProductos(); };
window.filtrar = renderProductos;
window.abrirModalNuevo = () => {
  editandoId = null;
  document.getElementById("modal-titulo").textContent = "Nuevo producto";
  ["m-nombre","m-emoji","m-precio","m-descripcion"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("m-categoria").value = "Fastfood";
  document.getElementById("modal-producto").classList.add("open");
};
window.cerrarModal = () => { document.getElementById("modal-producto").classList.remove("open"); editandoId = null; };
window.editarProducto = (id) => {
  const p = PRODUCTOS.find(x => x._id === id); if (!p) return;
  editandoId = id;
  document.getElementById("modal-titulo").textContent = "Editar producto";
  document.getElementById("m-nombre").value     = p.nombre;
  document.getElementById("m-emoji").value      = p.emoji || "";
  document.getElementById("m-precio").value     = p.precio;
  document.getElementById("m-categoria").value  = p.categoria;
  document.getElementById("m-descripcion").value= p.descripcion || "";
  document.getElementById("modal-producto").classList.add("open");
};
window.guardarProducto = async () => {
  const nombre = document.getElementById("m-nombre").value.trim();
  const precio = parseFloat(document.getElementById("m-precio").value);
  if (!nombre || !precio || precio <= 0) { showAlert("al-modal","error","⚠ Completa los campos obligatorios."); return; }
  const data = { nombre, emoji: document.getElementById("m-emoji").value.trim() || "🍽️", precio,
    categoria: document.getElementById("m-categoria").value, descripcion: document.getElementById("m-descripcion").value.trim(), activo: true };
  try {
    if (editandoId) await updateDoc(doc(db, "Productos", editandoId), data);
    else            await addDoc(collection(db, "Productos"), data);
    cerrarModal(); await cargarProductos();
  } catch(e) { showAlert("al-modal","error","Error al guardar: " + e.message); }
};
window.eliminarProducto = async (id, nombre) => {
  if (!confirm(`¿Desactivar "${nombre}"?`)) return;
  try { await updateDoc(doc(db, "Productos", id), { activo: false }); await cargarProductos(); }
  catch(e) { alert("Error: " + e.message); }
};
init();
</script>

<!-- Sidebar responsive -->
<script>
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  const isOpen  = sidebar.classList.contains("open");
  if (isOpen) { sidebar.classList.remove("open"); overlay.classList.remove("visible"); }
  else        { sidebar.classList.add("open");    overlay.classList.add("visible"); }
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("visible");
}
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".nav-item").forEach(el => {
    el.addEventListener("click", () => { if (window.innerWidth <= 900) closeSidebar(); });
  });
});
</script>

</html>
